<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Dropify</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Common CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo"><img src="images/logo.png" alt="" style="width: 150px;"></div>
</header>

<!-- LOGIN SECTION -->
<section class="auth-section">

    <div class="auth-container">

        <!-- LEFT CONTENT -->
        <div class="auth-info">
            <h2>Welcome Back</h2>
            <p>
                Login to manage your orders, products,
                and business on Dropify.
            </p>

            <ul>
                <li>✔ Secure login</li>
                <li>✔ Role based dashboard</li>
                <li>✔ Fast access to your account</li>
            </ul>
        </div>

        <!-- LOGIN FORM -->
        <div class="auth-form">
            <h3>Login</h3>

            <form>

                <input type="email" id="loginEmail" placeholder="Email" required>

<input type="password" id="loginPassword" placeholder="Password" required>

<button type="button" onclick="loginUser()">Login</button>

                <p class="auth-link">
                    Don’t have an account?
                    <br>
                    <a href="supplier-register.html">Become a Supplier</a> |
                    <a href="retailer-register.html">Register as Retailer</a>
                </p>

            </form>
        </div>

    </div>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-firestore-compat.js"></script>

<script src="js/auth.js"></script>
</section>


</body>
</html>
