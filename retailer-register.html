<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register as Retailer | Dropify</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Common CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Page CSS -->
    <link rel="stylesheet" href="css/retailer-register.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="logo"><img src="images/logo.png" alt="" style="width: 150px;"></div>
</header>

<!-- RETAILER REGISTER -->
<section class="auth-section">

    <div class="auth-container">

        <!-- LEFT CONTENT -->
        <div class="auth-info">
            <h2>Register as a Retailer</h2>
            <p>
                Start selling without inventory.
                Connect with trusted suppliers across Pakistan.
            </p>

            <ul>
                <li>✔ No stock required</li>
                <li>✔ Fast local delivery</li>
                <li>✔ Easy order management</li>
            </ul>
        </div>

        <!-- FORM -->
        <div class="auth-form">
            <h3>Retailer Registration</h3>

            <form>
                <input type="text" id="retailerName" placeholder="Full Name" required>

                <input type="email" id="retailerEmail" placeholder="Email" required>

                <input type="text" placeholder="Phone Number" required>

                <input type="password" id="retailerPassword" placeholder="Password" required>

                <button type="button" onclick="registerRetailer()">Register</button>

                <p class="auth-link">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </form>
        </div>

    </div>
    <script src="js/auth.js"></script>
</section>

</body>
</html>
